<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字王拼字比賽發音練習 (全)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f5f7fa; font-size: 15px; color: #333; }
        h2 { text-align: center; color: #2c3e50; font-size: 1.3rem; margin-bottom: 5px; }
        h3 { text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-top: 0; margin-bottom: 20px; }
        .section { background: white; border: 1px solid #e1e8ed; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .section-title { font-weight: bold; font-size: 1em; background-color: #34495e; color: white; padding: 8px; border-radius: 6px; margin-bottom: 10px; text-align: center; }
        
        /* 針對英檢特製的標題顏色 */
        .gept-title { background-color: #e67e22; } 
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #efeef0; padding: 10px 6px; text-align: left; vertical-align: top; }
        th { background-color: #f8f9fa; color: #666; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        
        .btn-speak { background: #2ecc71; color: white; border: none; padding: 6px 10px; border-radius: 20px; cursor: pointer; font-size: 14px; margin: 2px; }
        .btn-speak:active { background: #27ae60; }
        .btn-speak.zh { background: #3498db; }
        .btn-speak.zh:active { background: #2980b9; }
        
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: white; margin-bottom: 5px; }
        .tag-elem { background-color: #f1c40f; color: #333;} /* 國小 */
        .tag-junior { background-color: #3498db; } /* 國中 */
        .tag-senior { background-color: #9b59b6; } /* 高中 */
        
        .grammar-text { font-size: 0.9em; color: #e74c3c; margin-bottom: 5px; }
        .app-text { font-size: 0.9em; color: #7f8c8d; }
        
        b { color: #34495e; }
    </style>
</head>
<body>

<h2>實踐國小 英語單字王拼字比賽</h2>
<h3>單字與句型總表 & 全民英檢初級特訓</h3>

<!-- 1-26 一年級 -->
<div class="section">
    <div class="section-title">康軒 Go Go Starter 1.2 (一年級)</div>
    <table>
        <thead><tr><th width="15%">No.</th><th width="35%">中文</th><th width="35%">英文</th><th width="15%">發音</th></tr></thead>
        <tbody id="table1"></tbody>
    </table>
</div>

<!-- (中間省略原有的27-104區塊，為了保持簡潔，你可以直接貼上原本的區塊2, 3, 4) -->
<div class="section">
    <div class="section-title">康軒 進階單字與句型 (五、六年級) - 節錄展示</div>
    <table>
        <thead><tr><th width="15%">No.</th><th width="35%">中文/句型</th><th width="35%">英文/句型</th><th width="15%">發音</th></tr></thead>
        <tbody id="table4"></tbody>
    </table>
</div>

<!-- 新增：GEPT 全民英檢初級 強化版 -->
<div class="section">
    <div class="section-title gept-title">🏆 新制 GEPT 全民英檢初級 必背單字與語法</div>
    <table>
        <thead>
            <tr>
                <th width="5%">No.</th>
                <th width="12%">階段</th>
                <th width="23%">英文 / 中文</th>
                <th width="40%">語法解說 / 生活應用</th>
                <th width="20%">發音練習</th>
            </tr>
        </thead>
        <tbody id="table-gept"></tbody>
    </table>
</div>

<script>
// --- 原有資料結構 (為版面簡潔，此處僅保留部分作範例，請保留你原有的完整陣列) ---
const data1 = [
    {no: 1, ch: "蘋果", en: "apple"}, {no: 2, ch: "螞蟻", en: "ant"}
];
const data4 = [
    {no: 102, ch: "幾點了？", en: "What time is it?"}, {no: 103, ch: "現在是八點鐘。", en: "It's eight o'clock."}
];

// --- 新增：GEPT 資料結構 ---
// category 支援: '國小', '國中', '高中'
const geptData = [
    {
        no: 1, 
        category: "國小", 
        en: "ability", 
        ch: "能力", 
        grammar: "[名詞] ability to + 原形動詞 (做...的能力)", 
        app_en: "She has the ability to speak English well.",
        app_ch: "她有說一口好英文的能力。"
    },
    {
        no: 2, 
        category: "國中", 
        en: "carefully", 
        ch: "小心地；仔細地", 
        grammar: "[副詞] 修飾一般動詞，通常放在動詞後。", 
        app_en: "Please drive carefully at night.",
        app_ch: "夜間請小心開車。"
    },
    {
        no: 3, 
        category: "國中", 
        en: "decide", 
        ch: "決定", 
        grammar: "[動詞] decide to + 原形動詞 (決定去做...)", 
        app_en: "I decided to buy a new computer.",
        app_ch: "我決定買一台新電腦。"
    },
    {
        no: 4, 
        category: "高中", 
        en: "environment", 
        ch: "環境", 
        grammar: "[名詞] the environment 常指自然環境，不可數或單數。", 
        app_en: "We must protect the environment.",
        app_ch: "我們必須保護環境。"
    },
    {
        no: 5, 
        category: "國中", 
        en: "look forward to", 
        ch: "期待", 
        grammar: "[片語] to 為介系詞，後方必接 V-ing 或名詞。", 
        app_en: "I am looking forward to seeing you.",
        app_ch: "我很期待能見到你。"
    }
];

// --- 原有的發音函數 ---
function speak(text) {
    const cleanText = text.replace(/_+/g, '').replace(/\(.*\)/g, '');
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'en-US'; 
    window.speechSynthesis.speak(utterance);
}

// --- 新增：支援雙語發音的函數 (英/中) ---
function speakLang(text, lang) {
    const cleanText = text.replace(/_+/g, '').replace(/[\[\]\(\)]/g, ''); // 移除括號與中括號
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = lang; // 'en-US' 或是 'zh-TW'
    // 調整中文的語速稍微慢一點點會更清楚
    if(lang === 'zh-TW') utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

// --- 原有的表格渲染函數 ---
function renderTable(data, tableId) {
    const tbody = document.getElementById(tableId);
    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${item.no}</b></td>
            <td>${item.ch}</td>
            <td>${item.en}</td>
            <td><button class="btn-speak" onclick="speak('${item.en.replace(/'/g, "\\'")}')">🔊</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// --- 新增：GEPT 表格渲染函數 ---
function renderGeptTable(data, tableId) {
    const tbody = document.getElementById(tableId);
    data.forEach(item => {
        // 判斷階段標籤顏色
        let tagClass = "tag-junior";
        if(item.category === "國小") tagClass = "tag-elem";
        if(item.category === "高中") tagClass = "tag-senior";

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${item.no}</b></td>
            <td><span class="tag ${tagClass}">${item.category}</span></td>
            <td>
                <b style="font-size:1.1em; color:#2980b9;">${item.en}</b><br>
                <span>${item.ch}</span>
            </td>
            <td>
                <div class="grammar-text">✦ <b>語法：</b>${item.grammar}</div>
                <div class="app-text">📝 <b>應用：</b>${item.app_en}<br>${item.app_ch}</div>
            </td>
            <td>
                <button class="btn-speak" onclick="speakLang('${item.en.replace(/'/g, "\\'")}. ${item.app_en.replace(/'/g, "\\'")}', 'en-US')" title="聽英文">英🔊</button>
                <button class="btn-speak zh" onclick="speakLang('${item.ch}. ${item.grammar}. ${item.app_ch}', 'zh-TW')" title="聽中文">中🔊</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// 執行渲染
renderTable(data1, 'table1');
renderTable(data4, 'table4');
renderGeptTable(geptData, 'table-gept'); // 渲染英檢資料

</script>

</body>
</html>
