// GEPT 資料結構
const geptData = [
    {
        no: 1, 
        category: "國小", 
        en: "ability", 
        ch: "能力",

        app_ch: "我很期待能見到你。"

// 原有的發音函數
function speak(text) {
    const cleanText = text.replace(/_+/g, '').replace(/\(.*\)/g, '');
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'en-US'; 
    window.speechSynthesis.speak(utterance);
}

// 支援雙語發音的函數 (英/中)
function speakLang(text, lang) {
    const cleanText = text.replace(/_+/g, '').replace(/[\[\]\(\)]/g, ''); 
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = lang; 
    if(lang === 'zh-TW') utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

// 原有的表格渲染函數
function renderTable(data, tableId) {
    const tbody = document.getElementById(tableId);
    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${item.no}</b></td>
            <td>${item.ch}</td>
            <td>${item.en}</td>
            <td><button class="btn-speak" onclick="speak('${item.en.replace(/'/g, "\\'")}')">🔊</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// GEPT 表格渲染函數
function renderGeptTable(data, tableId) {
    const tbody = document.getElementById(tableId);
    data.forEach(item => {
        let tagClass = "tag-junior";
        if(item.category === "國小") tagClass = "tag-elem";
        if(item.category === "高中") tagClass = "tag-senior";

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${item.no}</b></td>
            <td><span class="tag ${tagClass}">${item.category}</span></td>
            <td>
                <b style="font-size:1.1em; color:#2980b9;">${item.en}</b><br>
                <span>${item.ch}</span>
            </td>
            <td>
                <div class="grammar-text">✦ <b>語法：</b>${item.grammar}</div>
                <div class="app-text">📝 <b>應用：</b>${item.app_en}<br>${item.app_ch}</div>
            </td>
            <td>
                <button class="btn-gept-speak" onclick="speakLang('${item.en.replace(/'/g, "\\'")}. ${item.app_en.replace(/'/g, "\\'")}', 'en-US')" title="聽英文">英🔊</button>
                <button class="btn-gept-speak zh" onclick="speakLang('${item.ch}. ${item.grammar}. ${item.app_ch}', 'zh-TW')" title="聽中文">中🔊</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// 執行所有渲染

renderGeptTable(geptData, 'table-gept');
